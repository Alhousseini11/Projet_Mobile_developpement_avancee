name: Deploy Backend

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/Projet_Mobile_developpement_avancee"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build backend nginx
            docker compose --env-file .env.prod -f docker-compose.prod.yml ps
