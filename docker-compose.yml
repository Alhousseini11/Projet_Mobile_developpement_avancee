services:
  postgres:
    image: postgres:16-alpine
    container_name: garage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mon_app
      POSTGRES_USER: mon_user
      POSTGRES_PASSWORD: Al98970071
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mon_user -d mon_app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garage-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://mon_user:Al98970071@postgres:5432/mon_app?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres_data:
